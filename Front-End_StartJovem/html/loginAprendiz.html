<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Aprendiz</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/login-aprendiz.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="page-background">
        <div class="login-card-container">
            
            <div class="left-panel">
                <div class="welcome-text">
                    <h1>Bem-vindo de volta!</h1>
                    <p>Acesse sua conta para continuar aprimorando suas habilidades e explorando novos conteúdos.</p>
                </div>
                <div class="footer-brand">TECNOLOGIA E INOVAÇÃO</div>
            </div>

            <div class="right-panel">
                <h2>Login de <strong>APRENDIZ</strong></h2>
                
                <form id="loginAprendizForm">
                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <div class="input-with-icon">
                            <i class="fa-solid fa-envelope"></i>
                            <input type="email" id="email" placeholder="seuemail@exemplo.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="senha">Senha</label>
                        <div class="input-with-icon">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="senha" placeholder="••••••••" required>
                        </div>
                        <a href="#" class="forgot-password">Esqueceu a senha?</a>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-primary">Entrar</button>
                    </div>

                    <div class="register-link">
                        <p>Não tem uma conta? <a href="cadastroAprendiz.html">Cadastre-se</a></p>
                    </div>
                </form>
            </div>

        </div>
    </div>

    <script type="module" src="/Front-End_StartJovem/assets/js/auth/loginAprendiz.js"></script>
</body>
</html>
