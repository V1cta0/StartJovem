<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações | StartJovem</title>
    
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/configuracoes.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="app-background">
    
    <button id="menuToggle" class="menu-toggle">
        <i class="fa-solid fa-bars"></i>
    </button>

    <div class="dashboard-layout">

        <!-- SIDEBAR PADRONIZADA -->
        <aside class="sidebar" id="sidebar">
            <div class="profile-section">
                <a href="perfil.html" class="profile-icon">
                    <i class="fa-regular fa-user"></i>
                </a>
            </div>

            <nav class="sidebar-nav">
                <a href="monitoramento.html" class="nav-item">
                    <i class="fa-solid fa-table-columns"></i>
                    <span>Dashboard</span>
                </a>
                <a href="turmas.html" class="nav-item">
                    <i class="fa-solid fa-users"></i>
                    <span>Turmas</span>
                </a>
                <a href="sobre.html" class="nav-item">
                    <i class="fa-solid fa-circle-info"></i>
                    <span>Sobre</span>
                </a>
            </nav>

            <div class="settings-section">
                <a href="configuracoes.html" class="nav-item active">
                    <i class="fa-solid fa-gear"></i>
                </a>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">

            <header class="top-header">
                <div class="usuario-box">
                    <h2>Configurações</h2>
                    <span>Gerencie sua conta</span>
                </div>
            </header>

            <div class="config-container">

                <!-- Card 1: Perfil -->
                <div class="config-card">
                    <div class="card-header">
                        <i class="fa-solid fa-user-circle"></i>
                        <span>Perfil</span>
                    </div>
                    <div class="card-body">
                        <div class="config-item">
                            <label>Nome</label>
                            <input type="text" id="nomeUsuario" placeholder="Seu nome">
                        </div>
                        <div class="config-item">
                            <label>Email</label>
                            <input type="email" id="email" readonly>
                        </div>
                        <div class="config-item">
                            <label>Telefone</label>
                            <input type="tel" id="telefone" placeholder="(00) 00000-0000">
                        </div>
                        <button class="btn-config" id="btnSalvarPerfil">
                            <i class="fa-solid fa-save"></i> Salvar Alterações
                        </button>
                    </div>
                </div>

                <!-- Card 2: Sessão (REDUZIDO) -->
                <div class="config-card card-sessao">
                    <div class="card-header">
                        <i class="fa-solid fa-power-off"></i>
                        <span>Sessão</span>
                    </div>
                    <div class="card-body">
                        <button class="btn-config btn-danger" id="btnLogout">
                            <i class="fa-solid fa-sign-out-alt"></i> Finalizar Sessão
                        </button>
                    </div>
                </div>

                <!-- Card 3: Sobre o Sistema -->
                <div class="config-card">
                    <div class="card-header">
                        <i class="fa-solid fa-info-circle"></i>
                        <span>Sobre o Sistema</span>
                    </div>
                    <div class="card-body">
                        <div class="info-line">
                            <strong>Versão:</strong>
                            <span>1.0.0</span>
                        </div>
                        <div class="info-line">
                            <strong>Desenvolvido por:</strong>
                            <span>StartJovem</span>
                        </div>
                        <div class="info-line">
                            <strong>Suporte:</strong>
                            <span>suporte@startjovem.com</span>
                        </div>
                    </div>
                </div>

            </div>

        </main>

    </div>

</div>

<script type="module" src="../assets/js/pages/configuracoes.js"></script>

</body>
</html>
