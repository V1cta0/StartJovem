<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gestor</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/login-gestor.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="page-background">
        <div class="login-card-container">
            
            <div class="left-panel">
                <div class="welcome-text">
                    <h1>Portal do Gestor</h1>
                    <p>Entre para gerenciar seus conteúdos, turmas e acompanhar o progresso dos aprendizes.</p>
                </div>
                <div class="footer-brand">TECNOLOGIA E INOVAÇÃO</div>
            </div>

            <div class="right-panel">
                <h2>Login de <strong class="text-purple">GESTOR</strong></h2>
                
                <form id="loginGestorForm">
                    <div class="form-group">
                        <label for="email">E-mail Institucional</label>
                        <div class="input-with-icon">
                            <i class="fa-solid fa-envelope"></i>
                            <input type="email" id="email" placeholder="gestor@instituicao.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="senha">Senha</label>
                        <div class="input-with-icon">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="senha" placeholder="••••••••" required>
                        </div>
                        <a href="#" class="forgot-password">Esqueceu a senha?</a>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-primary-purple">Entrar</button>
                    </div>

                    <div class="register-link">
                        <p>Não tem uma conta? <a href="cadastroGestor.html" class="link-purple">Cadastre-se</a></p>
                    </div>
                </form>
            </div>

        </div>
    </div>

    <script src="../assets/js/auth/loginGestor.js"></script>
</body>
</html>
