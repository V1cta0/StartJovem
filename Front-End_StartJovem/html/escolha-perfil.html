<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escolha seu Perfil</title>
    
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/escolha-perfil.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="page-background">
        <div class="content-wrapper">
            
            <div class="header-titles">
                <h1>Como você quer <span class="highlight-blue">começar?</span></h1>
                <p>Escolha seu perfil</p>
            </div>

            <div class="cards-container">
                
                <div class="profile-card card-aprendiz">
                    <div class="icon-wrapper">
                        <i class="fa-solid fa-user-graduate"></i>
                    </div>
                    <h2 class="title-aprendiz">APRENDIZ</h2>
                    <p>Aprimore suas habilidades</p>
                    <button id="btnAprendiz" class="btn btn-blue">Entrar</button>
                </div>

                <div class="divider">
                    <div class="line"></div>
                    <span>OU</span>
                    <div class="line"></div>
                </div>

                <div class="profile-card card-gestor">
                    <div class="icon-wrapper">
                        <i class="fa-solid fa-chalkboard-user"></i>
                    </div>
                    <h2 class="title-gestor">GESTOR</h2>
                    <p>Compartilhe seus conhecimentos</p>
                    <button id="btnGestor" class="btn btn-purple">Acessar</button>
                </div>

            </div>

            <div class="footer-login">
                <a href="index.html"><i class="fa-solid fa-arrow-left"></i> Voltar para a página inicial</a>
            </div>

        </div>
    </div>

    <script src="../assets/js/auth/escolha-perfil.js"></script>
</body>
</html>
