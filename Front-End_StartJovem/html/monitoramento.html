<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoramento - Dashboard</title>
    
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/monitoramento.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="app-background">
        
        <button id="menuToggle" class="menu-toggle">
            <i class="fa-solid fa-bars"></i>
        </button>

        <div class="dashboard-layout">
            
            <aside class="sidebar" id="sidebar">
                <div class="profile-section">
                    <a href="perfil.html" class="profile-icon">
                        <i class="fa-regular fa-user"></i>
                    </a>
                </div>
                
                <nav class="sidebar-nav">
                    <a href="#" class="nav-item"><i class="fa-regular fa-folder-open"></i><span>Projetos</span></a>
                    <a href="monitoramento.html" class="nav-item active"><i class="fa-solid fa-table-columns"></i><span>DashBoard</span></a>
                    <a href="#" class="nav-item"><i class="fa-regular fa-chart-bar"></i><span>Relatórios</span></a>
                    <a href="#" class="nav-item"><i class="fa-solid fa-check-to-slot"></i><span>Tarefas</span></a>
                </nav>

                <div class="settings-section">
                    <a href="configuracoes.html" class="nav-item"><i class="fa-solid fa-gear"></i></a>
                </div>
            </aside>

            <main class="main-content">
                
                <header class="top-header">
                    <div class="search-bar">
                        <input type="text" placeholder="Buscar...">
                    </div>
                    <div class="notification-bell">
                        <i class="fa-regular fa-bell"></i>
                    </div>
                </header>

                <div class="dashboard-grid">
                    
                    <div class="card info-card">
                        <div class="card-header">
                            <span><i class="fa-solid fa-stopwatch"></i> Tempo Trabalhado</span>
                        </div>
                        <div class="card-body">
                            <h3>12h 45min <i class="fa-regular fa-clock icon-right"></i></h3>
                        </div>
                    </div>

                    <div class="card info-card">
                        <div class="card-header">
                            <span>Tarefas Concluídas</span>
                        </div>
                        <div class="card-body">
                            <h3>10 <i class="fa-solid fa-check-double icon-right"></i></h3>
                        </div>
                    </div>

                    <div class="card info-card">
                        <div class="card-header">
                            <span><i class="fa-regular fa-folder"></i> Projetos Ativos</span>
                        </div>
                        <div class="card-body">
                            <h3>3</h3>
                        </div>
                    </div>

                    <div class="card chart-card">
                        <div class="card-header">
                            <span>Produtividade Semanal</span>
                        </div>
                        <div class="card-body">
                            <canvas id="produtividadeChart"></canvas>
                        </div>
                    </div>

                    <div class="card timer-card">
                        <div class="card-header">
                            <span>Temporizador Ativo</span>
                        </div>
                        <div class="card-body timer-display">
                            <h2 id="timerDisplay">1:20:34</h2>
                            <button id="toggleTimerBtn" class="btn-timer"><i class="fa-solid fa-pause"></i></button>
                        </div>
                    </div>

                    <div class="card kanban-column">
                        <div class="card-header">
                            <span>A Fazer</span>
                        </div>
                        <div class="card-body kanban-list">
                            <div class="kanban-item">-- -- --</div>
                            <div class="kanban-item">-- -- --</div>
                        </div>
                    </div>

                    <div class="card kanban-column">
                        <div class="card-header">
                            <span>Em progresso</span>
                        </div>
                        <div class="card-body kanban-list">
                            <div class="kanban-item">-- -- --</div>
                            <div class="kanban-item">-- -- --</div>
                        </div>
                    </div>

                    <div class="card kanban-column">
                        <div class="card-header">
                            <span>Concluído</span>
                        </div>
                        <div class="card-body kanban-list">
                            <div class="kanban-item">-- -- --</div>
                            <div class="kanban-item">-- -- --</div>
                        </div>
                    </div>

                </div>
            </main>
        </div>
    </div>

    <script src="../assets/js/pages/monitoramento.js"></script>
</body>
</html>
