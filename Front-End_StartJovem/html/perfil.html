<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil | StartJovem</title>
    
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/perfil.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="app-background">
    
    <button id="menuToggle" class="menu-toggle">
        <i class="fa-solid fa-bars"></i>
    </button>

    <div class="dashboard-layout">

        <!-- SIDEBAR PADRONIZADA -->
        <aside class="sidebar" id="sidebar">
            <div class="profile-section">
                <a href="perfil.html" class="profile-icon">
                    <i class="fa-regular fa-user"></i>
                </a>
            </div>

            <nav class="sidebar-nav">
                <a href="monitoramento.html" class="nav-item">
                    <i class="fa-solid fa-table-columns"></i>
                    <span>Dashboard</span>
                </a>
                <a href="turmas.html" class="nav-item">
                    <i class="fa-solid fa-users"></i>
                    <span>Turmas</span>
                </a>
                <a href="sobre.html" class="nav-item">
                    <i class="fa-solid fa-circle-info"></i>
                    <span>Sobre</span>
                </a>
            </nav>

            <div class="settings-section">
                <a href="configuracoes.html" class="nav-item">
                    <i class="fa-solid fa-gear"></i>
                </a>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">

            <div class="profile-glass-card">

                <div class="left-column">
                    <div class="user-header">
                        <div class="avatar-circle">
                            <i class="fa-regular fa-user"></i>
                        </div>
                        <div class="user-info">
                            <h2 id="nomeUsuario">Carregando...</h2>
                        </div>
                    </div>

                    <form class="profile-form" id="profileForm">
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" readonly>
                        </div>
                        <div class="form-group">
                            <label for="telefone">Telefone</label>
                            <input type="tel" id="telefone" placeholder="(00) 00000-0000">
                        </div>
                        <button type="button" class="btn-edit" id="btnSalvar">
                            <i class="fa-solid fa-save"></i> Salvar Alterações
                        </button>
                    </form>
                </div>

                <div class="vertical-divider"></div>

                <div class="right-column">
                    <div class="section">
                        <h3><i class="fa-regular fa-user"></i> Sobre Mim</h3>
                        <textarea id="bio" rows="4" placeholder="Fale um pouco sobre você..."></textarea>
                    </div>

                    <div class="section">
                        <h3><i class="fa-solid fa-graduation-cap"></i> Formação e Certificados</h3>
                        <div id="listaCursos" class="items-list"></div>
                        <div class="add-curso-area">
                            <input type="text" id="nomeCurso" placeholder="Nome do curso">
                            <input type="file" id="arquivoCurso" accept=".pdf,.jpg,.png">
                            <button class="btn-add" id="addCurso">
                                <i class="fa-solid fa-plus"></i> Adicionar
                            </button>
                        </div>
                    </div>

                    <div class="section">
                        <h3><i class="fa-solid fa-language"></i> Idiomas</h3>
                        <div id="listaIdiomas" class="items-list"></div>
                        <button class="btn-add" id="addIdioma">
                            <i class="fa-solid fa-plus"></i> Adicionar Idioma
                        </button>
                    </div>

                    <div class="section">
                        <h3><i class="fa-solid fa-code"></i> Habilidades</h3>
                        <div id="listaHabilidades" class="skills-container"></div>
                        <div class="add-skill-area">
                            <input type="text" id="novaHabilidade" placeholder="Ex: JavaScript, Figma...">
                            <button class="btn-add" id="addHabilidade">
                                <i class="fa-solid fa-plus"></i> Adicionar
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<script type="module" src="../assets/js/pages/perfil.js"></script>

</body>
</html>
